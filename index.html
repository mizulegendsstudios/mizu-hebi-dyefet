<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Python con Pyodide</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f7fa;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background-color: #2c3e50;
            color: #ecf0f1;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            min-height: 100px;
        }
        .status {
            text-align: center;
            margin: 15px 0;
            font-style: italic;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Prototipo Python con Pyodide</h1>
        <p>Escribe código Python y ejecútalo directamente en tu navegador:</p>
        
        <textarea id="code" placeholder="Escribe tu código Python aquí...">
# Ejemplo básico
nombre = "Mundo"
print(f"¡Hola, {nombre}!")

# Ejemplo con cálculos
resultado = 5 * 8
print(f"5 x 8 = {resultado}")

# Ejemplo con bucles
print("\nNúmeros del 1 al 5:")
for i in range(1, 6):
    print(i)
        </textarea>
        
        <button id="runBtn">Ejecutar Código</button>
        <div class="status" id="status">Cargando Python...</div>
        <div id="output">Resultados aparecerán aquí...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script>
        let pyodide;
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const runBtn = document.getElementById('runBtn');
        const codeInput = document.getElementById('code');

        // Inicializar Pyodide
        async function initPyodide() {
            try {
                status.textContent = "Cargando Python (puede tardar 10-20 segundos)...";
                pyodide = await loadPyodide();
                status.textContent = "¡Python listo! Puedes ejecutar código.";
                runBtn.disabled = false;
            } catch (error) {
                status.textContent = `Error: ${error.message}`;
                output.textContent = "Error al cargar Python. Verifica tu conexión a internet.";
            }
        }

        // Ejecutar código Python
        async function runPython() {
            if (!pyodide) {
                output.textContent = "Python aún no está cargado. Espera...";
                return;
            }

            const code = codeInput.value;
            output.textContent = "Ejecutando...\n";
            
            try {
                // Capturar la salida estándar
                pyodide.runPython(`
                    import sys
                    from io import StringIO
                    sys.stdout = StringIO()
                    sys.stderr = StringIO()
                `);

                // Ejecutar el código del usuario
                pyodide.runPython(code);

                // Obtener resultados
                const stdout = pyodide.runPython("sys.stdout.getvalue()");
                const stderr = pyodide.runPython("sys.stderr.getvalue()");
                
                if (stderr) {
                    output.textContent = `ERROR:\n${stderr}`;
                } else {
                    output.textContent = stdout || "Ejecución completada (sin salida visible)";
                }
            } catch (error) {
                output.textContent = `ERROR:\n${error.message}`;
            }
        }

        // Event listeners
        runBtn.addEventListener('click', runPython);
        runBtn.disabled = true;

        // Inicializar al cargar la página
        window.addEventListener('load', initPyodide);
    </script>
</body>
</html>
